<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeDB</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
.topbar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 26px; height: 26px; background: #534AB7; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; }
.conn-status { font-size: 12px; background: #eaf3de; color: #3b6d11; padding: 3px 10px; border-radius: 6px; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e5e0; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-section { padding: 12px 0; border-bottom: 1px solid #e5e5e0; }
.sidebar-title { font-size: 11px; font-weight: 600; color: #888; padding: 0 14px 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.sidebar-item { padding: 5px 14px; font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 2px solid transparent; }
.sidebar-item:hover { background: #f5f5f0; color: #1a1a1a; }
.sidebar-item.active { background: #eeedfe; color: #534AB7; border-left-color: #534AB7; font-weight: 500; }
.sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
.sidebar-item.active svg { opacity: 1; }
.quick-btn { font-size: 11px; background: #eeedfe; color: #534AB7; border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
.quick-btn:hover { background: #534AB7; color: white; }
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-panel { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 16px; flex-shrink: 0; }
.panel-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
#sql-editor { width: 100%; height: 80px; background: #f8f8f5; border: 1px solid #e5e5e0; border-radius: 8px; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 13px; color: #1a1a1a; resize: none; outline: none; line-height: 1.6; }
#sql-editor:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); }
.editor-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.btn-run { background: #534AB7; color: white; border: none; border-radius: 7px; padding: 7px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-run:hover { background: #3C3489; }
.btn-clear { background: transparent; border: 1px solid #e5e5e0; border-radius: 7px; padding: 7px 14px; font-size: 13px; color: #666; cursor: pointer; }
.btn-clear:hover { background: #f5f5f0; }
.shortcut-hint { font-size: 11px; color: #bbb; margin-left: 4px; font-weight: 400; text-transform: none; letter-spacing: 0; }
#status-msg { font-size: 12px; margin-left: auto; }
.status-ok  { color: #3b6d11; }
.status-err { color: #a32d2d; }
.results-panel { flex: 1; overflow: auto; padding: 16px; }
.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.results-table-wrap { overflow-x: auto; border: 1px solid #e5e5e0; border-radius: 10px; background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f8f5; padding: 8px 14px; text-align: left; font-weight: 600; color: #666; border-bottom: 1px solid #e5e5e0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
td { padding: 8px 14px; border-bottom: 1px solid #f0f0ea; color: #1a1a1a; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf7; }
.empty-state { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.raw-result { font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; padding: 16px; background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; color: #1a1a1a; line-height: 1.6; }
.single-result { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 20px 24px; display: flex; align-items: baseline; gap: 12px; }
.single-result-label { font-size: 13px; color: #888; }
.single-result-value { font-size: 28px; font-weight: 600; color: #534AB7; }
.success-result { background: #eaf3de; border: 1px solid #c0dd97; border-radius: 10px; padding: 14px 18px; color: #3b6d11; font-size: 13px; font-weight: 500; }
.error-result { background: #fcebeb; border: 1px solid #f09595; border-radius: 10px; padding: 14px 18px; color: #a32d2d; font-size: 13px; font-weight: 500; }
.stats-panel { background: #fff; border-top: 1px solid #e5e5e0; padding: 12px 16px; display: flex; gap: 16px; flex-shrink: 0; }
.stat-card { background: #f8f8f5; border-radius: 8px; padding: 8px 16px; min-width: 110px; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: 600; color: #534AB7; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">F</div>
    ForgeDB
  </div>
  <div class="conn-status" id="conn-status">connecting...</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Tables</div>
      <div id="tables-list"><div style="padding:8px 14px;font-size:12px;color:#aaa;">Loading...</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Quick queries</div>
      <div style="padding: 8px 14px; display: flex; flex-direction: column; gap: 6px;">
        <button class="quick-btn" onclick="runSQL('SHOW TABLES')">SHOW TABLES</button>
        <button class="quick-btn" onclick="setEditor('SELECT * FROM ')">SELECT *</button>
        <button class="quick-btn" onclick="setEditor('CREATE TABLE  (id INT, name TEXT)')">CREATE TABLE</button>
        <button class="quick-btn" onclick="setEditor('INSERT INTO  VALUES ()')">INSERT</button>
        <button class="quick-btn" onclick="setEditor('SELECT COUNT(*) FROM ')">COUNT(*)</button>
        <button class="quick-btn" onclick="setEditor('EXPLAIN SELECT * FROM ')">EXPLAIN</button>
        <button class="quick-btn" onclick="setEditor('CREATE INDEX ON ()')">CREATE INDEX</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Indexes</div>
      <div id="indexes-list"><div style="padding:8px 14px;font-size:12px;color:#aaa;">Select a table</div></div>
    </div>
  </div>

  <div class="content">
    <div class="editor-panel">
      <div class="panel-label">Query editor <span class="shortcut-hint">Ctrl+Enter to run</span></div>
      <textarea id="sql-editor" placeholder="Type your SQL here...&#10;Example: SELECT * FROM users"></textarea>
      <div class="editor-actions">
        <button class="btn-run" onclick="runQuery()">&#9654; Run query</button>
        <button class="btn-clear" onclick="clearEditor()">Clear</button>
        <span id="status-msg"></span>
      </div>
    </div>

    <div class="results-panel">
      <div class="results-header">
        <div class="panel-label" style="margin:0;">Results</div>
        <span id="row-count" style="font-size:12px;color:#aaa;"></span>
      </div>
      <div id="results-container">
        <div class="empty-state">Run a query to see results</div>
      </div>
    </div>

    <div class="stats-panel">
      <div class="stat-card">
        <div class="stat-label">Tables</div>
        <div class="stat-value" id="stat-tables">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last query</div>
        <div class="stat-value" id="stat-time">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rows returned</div>
        <div class="stat-value" id="stat-rows">-</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/query';
let selectedTable = null;

async function sendSQL(sql) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: sql
  });
  return await res.text();
}

async function runSQL(sql) {
  document.getElementById('sql-editor').value = sql;
  await runQuery();
}

function setEditor(sql) {
  document.getElementById('sql-editor').value = sql;
  document.getElementById('sql-editor').focus();
}

function clearEditor() {
  document.getElementById('sql-editor').value = '';
  document.getElementById('results-container').innerHTML = '<div class="empty-state">Run a query to see results</div>';
  document.getElementById('status-msg').textContent = '';
  document.getElementById('row-count').textContent = '';
}

async function runQuery() {
  const sql = document.getElementById('sql-editor').value.trim();
  if (!sql) return;

  const start = Date.now();
  const statusEl = document.getElementById('status-msg');
  statusEl.textContent = 'Running...';
  statusEl.className = '';

  try {
    const result = await sendSQL(sql);
    const elapsed = Date.now() - start;
    document.getElementById('stat-time').textContent = elapsed + 'ms';
    renderResult(result);
    await refreshSidebar();
    statusEl.textContent = '? Done in ' + elapsed + 'ms';
    statusEl.className = 'status-ok';
  } catch(e) {
    statusEl.textContent = '? Connection error';
    statusEl.className = 'status-err';
  }
}

function renderResult(text) {
  const container = document.getElementById('results-container');
  const rowCountEl = document.getElementById('row-count');
  const statRows = document.getElementById('stat-rows');
  text = text.trim();

  // Error
  if (text.startsWith('Error:') || text.startsWith('Invalid')) {
    container.innerHTML = '<div class="error-result">' + escHtml(text) + '</div>';
    statRows.textContent = '0';
    rowCountEl.textContent = '';
    return;
  }

  // Table result with separator line
  const lines = text.split('\n');
  const hasSeparator = lines.length > 1 && lines[1] && lines[1].startsWith('---');
  if (hasSeparator) {
    const headers = lines[0].split('|').map(h => h.trim());
    const dataLines = lines.slice(2).filter(l => l.trim() !== '');
    let html = '<div class="results-table-wrap"><table><thead><tr>';
    headers.forEach(h => { html += '<th>' + escHtml(h) + '</th>'; });
    html += '</tr></thead><tbody>';
    dataLines.forEach(line => {
      const cells = line.split('|').map(c => c.trim());
      html += '<tr>';
      cells.forEach(c => { html += '<td>' + escHtml(c) + '</td>'; });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    statRows.textContent = dataLines.length;
    rowCountEl.textContent = dataLines.length + ' row' + (dataLines.length !== 1 ? 's' : '');
    return;
  }

  // Single value result: COUNT(*) = 3, MAX(id) = 5, etc.
  if (text.includes(' = ') && lines.length === 1) {
    const parts = text.split(' = ');
    container.innerHTML = '<div class="single-result">'
      + '<span class="single-result-label">' + escHtml(parts[0]) + '</span>'
      + '<span class="single-result-value">' + escHtml(parts[1]) + '</span>'
      + '</div>';
    statRows.textContent = '1';
    rowCountEl.textContent = '';
    return;
  }

  // Success messages (Inserted, Updated, Deleted, Created, Dropped etc.)
  const successWords = ['Inserted', 'Updated', 'Deleted', 'Table', 'Column', 'Index', 'No rows'];
  if (successWords.some(w => text.startsWith(w))) {
    container.innerHTML = '<div class="success-result">' + escHtml(text) + '</div>';
    statRows.textContent = '-';
    rowCountEl.textContent = '';
    return;
  }

  // Fallback — raw text (EXPLAIN, SHOW TABLES, etc.)
  container.innerHTML = '<div class="raw-result">' + escHtml(text) + '</div>';
  statRows.textContent = '-';
  rowCountEl.textContent = '';
}

async function refreshSidebar() {
  try {
    const result = await sendSQL('SHOW TABLES');
    const lines = result.trim().split('\n').slice(2).filter(l => l.trim());
    document.getElementById('stat-tables').textContent = lines.length;
    const tablesList = document.getElementById('tables-list');
    if (lines.length === 0) {
      tablesList.innerHTML = '<div style="padding:8px 14px;font-size:12px;color:#aaa;">No tables</div>';
      return;
    }
    tablesList.innerHTML = lines.map(t => {
      const name = t.trim();
      return '<div class="sidebar-item ' + (selectedTable === name ? 'active' : '') + '" onclick="selectTable(\'' + name + '\')">'
        + '<svg viewBox="0 0 14 14" fill="currentColor"><path d="M1 2h12v2H1zm0 3h12v2H1zm0 3h12v2H1z"/></svg>'
        + name + '</div>';
    }).join('');
  } catch(e) {}
}

async function selectTable(name) {
  selectedTable = name;
  await refreshSidebar();
  document.getElementById('sql-editor').value = 'SELECT * FROM ' + name;
  try {
    const idxResult = await sendSQL('SHOW INDEXES ON ' + name);
    const indexesList = document.getElementById('indexes-list');
    if (idxResult.includes('No indexes')) {
      indexesList.innerHTML = '<div style="padding:8px 14px;font-size:12px;color:#aaa;">No indexes on ' + name + '</div>';
    } else {
      const lines = idxResult.trim().split('\n').slice(2).filter(l => l.trim());
      indexesList.innerHTML = lines.map(l =>
        '<div class="sidebar-item">'
        + '<svg viewBox="0 0 14 14" fill="currentColor"><path d="M2 2h10v1H2zm2 3h6v1H4zm-2 3h10v1H2z"/></svg>'
        + l.trim() + '</div>'
      ).join('');
    }
  } catch(e) {}
  await runQuery();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('sql-editor').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runQuery(); }
});

async function init() {
  try {
    await sendSQL('SHOW TABLES');
    document.getElementById('conn-status').textContent = '? connected — localhost:8080';
    document.getElementById('conn-status').style.background = '#eaf3de';
    document.getElementById('conn-status').style.color = '#3b6d11';
    await refreshSidebar();
  } catch(e) {
    document.getElementById('conn-status').textContent = '? cannot connect';
    document.getElementById('conn-status').style.background = '#fcebeb';
    document.getElementById('conn-status').style.color = '#a32d2d';
  }
}

init();
</script>
</body>
</html>
