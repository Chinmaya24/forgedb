<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeDB</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e11;
  --surface: #16161a;
  --surface2: #1e1e24;
  --surface3: #26262e;
  --border: #2a2a35;
  --border2: #35353f;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,106,247,0.15);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.08);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
  --amber: #fbbf24;
  --text: #e8e8f0;
  --text2: #9898a8;
  --text3: #5a5a6a;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-display); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Topbar */
.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 10; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: white; box-shadow: 0 0 16px rgba(124,106,247,0.4); }
.logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.logo-text span { color: var(--accent2); }
.topbar-spacer { flex: 1; }
.conn-pill { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--green); background: var(--green-bg); border: 1px solid rgba(74,222,128,0.2); padding: 4px 10px; border-radius: 20px; }
.conn-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.conn-pill.err { color: var(--red); background: var(--red-bg); border-color: rgba(248,113,113,0.2); }
.conn-pill.err .conn-dot { background: var(--red); animation: none; }
.kbd { font-family: var(--font-mono); font-size: 10px; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); padding: 2px 6px; border-radius: 4px; }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar-header { padding: 16px 16px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding-bottom: 16px; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.sidebar-section { margin-bottom: 4px; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; padding: 12px 16px 6px; display: flex; align-items: center; gap: 6px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.table-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border-left: 2px solid transparent; font-family: var(--font-mono); }
.table-item:hover { background: var(--surface2); color: var(--text); }
.table-item.active { background: var(--accent-glow); color: var(--accent2); border-left-color: var(--accent); }
.table-icon { width: 14px; height: 14px; opacity: 0.6; flex-shrink: 0; }
.table-badge { margin-left: auto; font-size: 10px; background: var(--surface3); color: var(--text3); padding: 1px 6px; border-radius: 10px; font-family: var(--font-mono); }
.active .table-badge { background: var(--accent-glow); color: var(--accent2); }
.index-item { display: flex; align-items: center; gap: 8px; padding: 5px 16px 5px 28px; font-size: 11px; color: var(--text3); font-family: var(--font-mono); }

/* Quick queries */
.quick-section { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.quick-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 11px; font-family: var(--font-mono); padding: 6px 10px; border-radius: 6px; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.quick-btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent2); }
.quick-tag { font-size: 9px; background: var(--accent-glow); color: var(--accent2); padding: 1px 5px; border-radius: 3px; margin-left: auto; }

/* Content area */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Editor */
.editor-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px; flex-shrink: 0; }
.editor-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.editor-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
.editor-box { position: relative; }
.line-numbers { position: absolute; left: 0; top: 0; bottom: 0; width: 36px; background: var(--surface2); border-right: 1px solid var(--border); border-radius: 8px 0 0 8px; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 0; pointer-events: none; }
.line-num { font-family: var(--font-mono); font-size: 12px; color: var(--text3); line-height: 1.6; height: 19.2px; display: flex; align-items: center; }
#sql-editor { width: 100%; min-height: 90px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 12px 12px 48px; font-family: var(--font-mono); font-size: 13px; color: var(--text); resize: none; outline: none; line-height: 1.6; transition: border-color 0.2s, box-shadow 0.2s; }
#sql-editor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#sql-editor::placeholder { color: var(--text3); }
.editor-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.btn-run { background: var(--accent); color: white; border: none; border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 600; font-family: var(--font-display); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; box-shadow: 0 0 20px var(--accent-glow); }
.btn-run:hover { background: var(--accent2); box-shadow: 0 0 30px rgba(124,106,247,0.4); transform: translateY(-1px); }
.btn-run:active { transform: translateY(0); }
.btn-run.loading { opacity: 0.7; cursor: not-allowed; }
.btn-secondary { background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; padding: 8px 14px; font-size: 13px; font-family: var(--font-display); cursor: pointer; transition: all 0.15s; }
.btn-secondary:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }
.status-msg { font-size: 12px; margin-left: auto; font-family: var(--font-mono); }
.status-ok { color: var(--green); }
.status-err { color: var(--red); }

/* Results */
.results-area { flex: 1; overflow: auto; padding: 16px; }
.results-area::-webkit-scrollbar { width: 6px; height: 6px; }
.results-area::-webkit-scrollbar-track { background: transparent; }
.results-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.results-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
.row-badge { font-family: var(--font-mono); font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text3); gap: 12px; }
.empty-icon { width: 40px; height: 40px; opacity: 0.3; }
.empty-text { font-size: 13px; }

/* Table result */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-table th { background: var(--surface2); padding: 9px 16px; text-align: left; font-weight: 600; color: var(--text3); border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; font-family: var(--font-mono); }
.result-table td { padding: 9px 16px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; font-family: var(--font-mono); font-size: 12px; transition: background 0.1s; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tbody tr:hover td { background: var(--surface2); }
.result-table td:first-child { color: var(--text2); }

/* Single value */
.single-val { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px 28px; display: flex; align-items: baseline; gap: 16px; animation: fadeIn 0.2s ease; }
.single-val-label { font-family: var(--font-mono); font-size: 13px; color: var(--text2); }
.single-val-num { font-family: var(--font-mono); font-size: 42px; font-weight: 600; color: var(--accent2); line-height: 1; }

/* Success / error */
.result-success { background: var(--green-bg); border: 1px solid rgba(74,222,128,0.2); border-radius: 10px; padding: 14px 18px; color: var(--green); font-family: var(--font-mono); font-size: 13px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.2s ease; }
.result-error { background: var(--red-bg); border: 1px solid rgba(248,113,113,0.2); border-radius: 10px; padding: 14px 18px; color: var(--red); font-family: var(--font-mono); font-size: 13px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.2s ease; }
.result-raw { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.7; animation: fadeIn 0.2s ease; }

/* Stats bar */
.stats-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 24px; flex-shrink: 0; align-items: center; }
.stat { display: flex; align-items: center; gap: 8px; }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-val { font-family: var(--font-mono); font-size: 12px; color: var(--text2); font-weight: 500; }
.stat-val.hi { color: var(--accent2); }
.divider { width: 1px; height: 16px; background: var(--border); }

/* Spinner */
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">F</div>
    <div class="logo-text">Forge<span>DB</span></div>
  </div>
  <div class="topbar-spacer"></div>
  <span class="kbd">Ctrl+Enter</span>
  <span style="font-size:12px;color:var(--text3);">to run</span>
  <div class="conn-pill err" id="conn-pill">
    <div class="conn-dot"></div>
    <span id="conn-text">connecting...</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="section-label">Tables</div>
        <div id="tables-list">
          <div style="padding:12px 16px;font-size:12px;color:var(--text3);font-family:var(--font-mono);">loading...</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Indexes</div>
        <div id="indexes-list">
          <div class="index-item">select a table</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Quick queries</div>
        <div class="quick-section">
          <button class="quick-btn" onclick="runSQL('SHOW TABLES')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M0 1h10v2H0zm0 3h10v2H0zm0 3h10v2H0z"/></svg>
            SHOW TABLES <span class="quick-tag">meta</span>
          </button>
          <button class="quick-btn" onclick="setEditor('SELECT * FROM ')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1 2h8v1H1zm0 2h8v1H1zm0 2h5v1H1z"/></svg>
            SELECT * FROM <span class="quick-tag">read</span>
          </button>
          <button class="quick-btn" onclick="setEditor('INSERT INTO  VALUES ()')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M4 0h2v4h4v2H6v4H4V6H0V4h4z"/></svg>
            INSERT INTO <span class="quick-tag">write</span>
          </button>
          <button class="quick-btn" onclick="setEditor('UPDATE  SET  =  WHERE  = ')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M7 1l2 2-6 6H1V7z"/></svg>
            UPDATE ... SET <span class="quick-tag">write</span>
          </button>
          <button class="quick-btn" onclick="setEditor('DELETE FROM  WHERE  = ')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            DELETE FROM <span class="quick-tag">write</span>
          </button>
          <button class="quick-btn" onclick="setEditor('CREATE TABLE  (id INT, name TEXT)')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="1" y="1" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 4h2M5 3v2"/></svg>
            CREATE TABLE <span class="quick-tag">ddl</span>
          </button>
          <button class="quick-btn" onclick="setEditor('SELECT COUNT(*) FROM ')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M5 1a4 4 0 100 8A4 4 0 005 1zm0 1.5A2.5 2.5 0 115 7.5 2.5 2.5 0 015 2.5z"/></svg>
            COUNT(*) <span class="quick-tag">agg</span>
          </button>
          <button class="quick-btn" onclick="setEditor('EXPLAIN SELECT * FROM ')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M5 1v1M5 8v1M1 5H0M10 5H9M2.5 2.5l.7.7M6.8 6.8l.7.7M2.5 7.5l.7-.7M6.8 3.2l.7-.7"/></svg>
            EXPLAIN <span class="quick-tag">plan</span>
          </button>
          <button class="quick-btn" onclick="setEditor('CREATE INDEX ON ()')">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1h6v2H2zm1 3h4v1H3zm-1 2h6v1H2z"/></svg>
            CREATE INDEX <span class="quick-tag">idx</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="editor-wrap">
      <div class="editor-top">
        <div class="editor-label">Query editor</div>
      </div>
      <div class="editor-box">
        <textarea id="sql-editor" spellcheck="false" placeholder="SELECT * FROM users WHERE id = 1"></textarea>
      </div>
      <div class="editor-actions">
        <button class="btn-run" id="run-btn" onclick="runQuery()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="white"><path d="M3 2l7 4-7 4z"/></svg>
          Run query
        </button>
        <button class="btn-secondary" onclick="clearEditor()">Clear</button>
        <span class="status-msg" id="status-msg"></span>
      </div>
    </div>

    <div class="results-area">
      <div class="results-header">
        <div class="results-label">Results</div>
        <div id="row-badge" style="display:none;" class="row-badge"></div>
      </div>
      <div id="results-container">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="8" width="32" height="24" rx="3"/>
            <path d="M4 14h32M12 14v18M4 20h32"/>
          </svg>
          <div class="empty-text">Run a query to see results</div>
        </div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Tables</span>
        <span class="stat-val hi" id="stat-tables">—</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Rows</span>
        <span class="stat-val" id="stat-rows">—</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-val" id="stat-time">—</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-label">Status</span>
        <span class="stat-val" id="stat-status">idle</span>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/query';
let selectedTable = null;
let queryCount = 0;

async function sendSQL(sql) {
  const r = await fetch(API, { method:'POST', headers:{'Content-Type':'text/plain'}, body: sql });
  return await r.text();
}

async function runSQL(sql) {
  document.getElementById('sql-editor').value = sql;
  await runQuery();
}

function setEditor(sql) {
  const ed = document.getElementById('sql-editor');
  ed.value = sql;
  ed.focus();
  const pos = sql.length;
  ed.setSelectionRange(pos, pos);
}

function clearEditor() {
  document.getElementById('sql-editor').value = '';
  document.getElementById('results-container').innerHTML = emptyState();
  document.getElementById('status-msg').textContent = '';
  document.getElementById('row-badge').style.display = 'none';
  document.getElementById('stat-rows').textContent = '—';
  document.getElementById('stat-status').textContent = 'idle';
  document.getElementById('stat-status').style.color = 'var(--text2)';
}

function emptyState() {
  return '<div class="empty-state"><svg class="empty-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="8" width="32" height="24" rx="3"/><path d="M4 14h32M12 14v18M4 20h32"/></svg><div class="empty-text">Run a query to see results</div></div>';
}

async function runQuery() {
  const sql = document.getElementById('sql-editor').value.trim();
  if (!sql) return;

  const btn = document.getElementById('run-btn');
  const statusEl = document.getElementById('status-msg');
  btn.innerHTML = '<div class="spin"></div> Running...';
  btn.classList.add('loading');
  statusEl.textContent = '';

  const start = Date.now();
  try {
    const result = await sendSQL(sql);
    const elapsed = Date.now() - start;
    document.getElementById('stat-time').textContent = elapsed + 'ms';
    renderResult(result);
    await refreshSidebar();
    statusEl.textContent = '? ' + elapsed + 'ms';
    statusEl.className = 'status-msg status-ok';
    document.getElementById('stat-status').textContent = 'ok';
    document.getElementById('stat-status').style.color = 'var(--green)';
    queryCount++;
  } catch(e) {
    statusEl.textContent = '? connection error';
    statusEl.className = 'status-msg status-err';
    document.getElementById('stat-status').textContent = 'error';
    document.getElementById('stat-status').style.color = 'var(--red)';
  }

  btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="white"><path d="M3 2l7 4-7 4z"/></svg> Run query';
  btn.classList.remove('loading');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResult(text) {
  const container = document.getElementById('results-container');
  const rowBadge = document.getElementById('row-badge');
  const statRows = document.getElementById('stat-rows');
  text = text.trim();

  rowBadge.style.display = 'none';

  if (text.startsWith('Error:') || text.startsWith('Invalid')) {
    container.innerHTML = '<div class="result-error"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 1a6 6 0 100 12A6 6 0 007 1zm-.75 3.5h1.5v4h-1.5zm0 5h1.5v1.5h-1.5z"/></svg>' + esc(text) + '</div>';
    statRows.textContent = '0';
    document.getElementById('stat-status').textContent = 'error';
    document.getElementById('stat-status').style.color = 'var(--red)';
    return;
  }

  const lines = text.split('\n');
  const hasSep = lines.length > 1 && lines[1] && lines[1].startsWith('---');

  if (hasSep) {
    const headers = lines[0].split('|').map(h => h.trim());
    const dataLines = lines.slice(2).filter(l => l.trim());
    let html = '<div class="table-wrap"><table class="result-table"><thead><tr>';
    headers.forEach(h => { html += '<th>' + esc(h) + '</th>'; });
    html += '</tr></thead><tbody>';
    dataLines.forEach(line => {
      const cells = line.split('|').map(c => c.trim());
      html += '<tr>';
      cells.forEach(c => { html += '<td>' + esc(c) + '</td>'; });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    const n = dataLines.length;
    rowBadge.textContent = n + ' row' + (n !== 1 ? 's' : '');
    rowBadge.style.display = 'inline-block';
    statRows.textContent = n;
    return;
  }

  if (text.includes(' = ') && lines.length === 1) {
    const parts = text.split(' = ');
    container.innerHTML = '<div class="single-val"><span class="single-val-label">' + esc(parts[0]) + '</span><span class="single-val-num">' + esc(parts[1]) + '</span></div>';
    statRows.textContent = '1';
    return;
  }

  const successWords = ['Inserted','Updated','Deleted','Table','Column','Index','No rows'];
  if (successWords.some(w => text.startsWith(w))) {
    container.innerHTML = '<div class="result-success"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 1a6 6 0 100 12A6 6 0 007 1zm3 4l-3.5 4-2-2 1-1 1 1 2.5-3z"/></svg>' + esc(text) + '</div>';
    statRows.textContent = '—';
    return;
  }

  container.innerHTML = '<div class="result-raw">' + esc(text) + '</div>';
  statRows.textContent = '—';
}

async function refreshSidebar() {
  try {
    const result = await sendSQL('SHOW TABLES');
    const lines = result.trim().split('\n').slice(2).filter(l => l.trim());
    document.getElementById('stat-tables').textContent = lines.length;
    const list = document.getElementById('tables-list');
    if (!lines.length) {
      list.innerHTML = '<div style="padding:8px 16px;font-size:11px;color:var(--text3);font-family:var(--font-mono);">no tables yet</div>';
      return;
    }
    list.innerHTML = lines.map(t => {
      const name = t.trim();
      const active = selectedTable === name ? ' active' : '';
      return '<div class="table-item' + active + '" onclick="selectTable(\'' + name + '\')">'
        + '<svg class="table-icon" viewBox="0 0 14 14" fill="currentColor"><path d="M1 2h12v3H1zm0 4h12v3H1zm0 4h12v2H1z"/></svg>'
        + name
        + '</div>';
    }).join('');
  } catch(e) {}
}

async function selectTable(name) {
  selectedTable = name;
  await refreshSidebar();
  document.getElementById('sql-editor').value = 'SELECT * FROM ' + name;

  try {
    const idxResult = await sendSQL('SHOW INDEXES ON ' + name);
    const list = document.getElementById('indexes-list');
    if (idxResult.includes('No indexes')) {
      list.innerHTML = '<div class="index-item" style="color:var(--text3);">no indexes</div>';
    } else {
      const idxLines = idxResult.trim().split('\n').slice(2).filter(l => l.trim());
      list.innerHTML = idxLines.map(l =>
        '<div class="index-item"><svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" style="opacity:0.5"><path d="M1 1h8v2H1zm1 3h6v1H2zm-1 2h8v2H1z"/></svg>' + esc(l.trim()) + '</div>'
      ).join('');
    }
  } catch(e) {}

  await runQuery();
}

document.getElementById('sql-editor').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runQuery(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target;
    const s = el.selectionStart;
    el.value = el.value.substring(0, s) + '  ' + el.value.substring(el.selectionEnd);
    el.selectionStart = el.selectionEnd = s + 2;
  }
});

async function init() {
  try {
    await sendSQL('SHOW TABLES');
    const pill = document.getElementById('conn-pill');
    pill.className = 'conn-pill';
    document.getElementById('conn-text').textContent = 'localhost:8080';
    await refreshSidebar();
  } catch(e) {
    document.getElementById('conn-text').textContent = 'cannot connect';
  }
}

init();
</script>
</body>
</html>
